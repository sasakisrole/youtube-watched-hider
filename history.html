<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YT Watched History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .header {
      background: #16213e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid #2a2a4a;
    }

    .header h1 {
      font-size: 18px;
      color: #ff4444;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats-badge {
      font-size: 13px;
      color: #999;
    }

    .stats-badge strong {
      color: #ff4444;
      font-size: 16px;
    }

    .toolbar {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      position: sticky;
      top: 53px;
      z-index: 9;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      background: #0f1629;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }

    .search-box:focus { border-color: #ff4444; }

    .sort-btn {
      padding: 6px 14px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .sort-btn:hover { background: #1a3a5c; }
    .sort-btn.active { border-color: #ff4444; color: #ff4444; }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 24px;
    }

    .date-header {
      font-size: 13px;
      font-weight: 600;
      color: #ff8888;
      padding: 16px 0 6px;
      border-bottom: 1px solid #2a2a4a;
      margin-bottom: 4px;
      position: sticky;
      top: 105px;
      background: #1a1a2e;
      z-index: 5;
    }

    .date-header:first-child { padding-top: 0; }

    .video-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #16213e;
      border-radius: 6px;
      margin-bottom: 3px;
      text-decoration: none;
      color: #e0e0e0;
      transition: background 0.15s;
    }

    .video-row:hover { background: #1a3a5c; }

    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .badge-yt {
      background: #ff444433;
      color: #ff8888;
    }

    .badge-count {
      background: #4444ff33;
      color: #8888ff;
    }

    .video-info {
      flex: 1;
      min-width: 0;
    }

    .video-title {
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .video-channel {
      font-size: 11px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 1px;
    }

    .video-time {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .video-id {
      font-size: 10px;
      color: #444;
      font-family: monospace;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 48px 0;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      color: #888;
      padding: 48px 0;
      font-size: 14px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>YT Watched History</h1>
    <div class="header-right">
      <span class="stats-badge"><strong id="totalCount">-</strong> videos</span>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" id="search" placeholder="Search title or channel...">
    <button class="sort-btn active" data-sort="date-desc">New</button>
    <button class="sort-btn" data-sort="date-asc">Old</button>
    <button class="sort-btn" data-sort="count-desc">Most Played</button>
    <button class="sort-btn" data-sort="channel">Channel</button>
    <button class="sort-btn" data-sort="title">Title</button>
  </div>

  <div class="content" id="content">
    <div class="loading">Loading...</div>
  </div>

  <script src="history.js"></script>
</body>
</html>
